#     deadband_velocity: [0.0, 0.0, 0.0]
#     velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    base_frame_id: "<frame_namespace>/base_footprint"
    odom_frame_id: "<frame_namespace>/ekf_odom"
    # cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "filtered_key_vel"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    # cmd_vel_out_topic: "cmd_vel_collision"
    # cmd_vel_in_topic: "cmd_vel_nav"      # input from controller
    # cmd_vel_out_topic: "cmd_vel_scale"   # output to velocity_smoother
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 2.0
    base_shift_correction: True
    stop_pub_timeout: 2.0

    # Polygons represent zone around the robot for "stop", "slowdown" and "limit" action types,
    # and robot footprint for "approach" action type. https://docs.nav2.org/tutorials/docs/using_collision_monitor.html
    # polygons: ["PolygonStop", "PolygonSlow", "WideApproach"]
    polygons: ["PolygonStop"]
    PolygonStop:
      type: "polygon"
      # points: "[[ 0.35,  0.3], [ 0.35,  -0.3],[ -0.35,  -0.3], [ -0.35,  0.3]]"
      points: "[[ 0.33,  0.28], [ 0.33,  -0.28],[ -0.33,  -0.28], [ -0.33,  0.28]]"
      action_type: "stop"
      min_points: 4  # max_points: 3 for Humble
      visualize: True
      polygon_pub_topic: "polygon_stop"
    # PolygonSlow:
    #   type: "polygon"
    #   # points: "[[ 0.4,  0.35], [ 0.4,  -0.35],[ -0.4,  -0.35], [ -0.4,  0.35]]"
    #   points: "[[ 0.38,  0.33], [ 0.38,  -0.33],[ -0.38,  -0.33], [ -0.38,  0.33]]"
    #   action_type: "slowdown"
    #   min_points: 4  # max_points: 3 for Humble
    #   slowdown_ratio: 0.5 #  0.8     visualize: True
    #   visualize: True
    #   # time_before_collision_: 1.5 
    #   polygon_pub_topic: "polygon_slowdown"

    # Layer 2: Far detection - gentle slowdown
    WideApproach:
      type: "polygon"
      action_type: "slowdown"
      visualize: True
      polygon_pub_topic: "gentle_slowdown"
      # time_before_collision_: 3.0
      min_points: 4  # max_points: 3 for Humble
      slowdown_ratio: 0.75       # ← Keep 75% speed
      points: "[[ 0.55,  0.45], [ 0.55,  -0.45],[ -0.5,  -0.4], [ -0.5,  0.4]]"


    # polygons: ["VelocityPolygonStop"]
    # VelocityPolygonStop:
    #   type: "velocity_polygon"
    #   action_type: "slowdown"
    #   min_points: 6
    #   visualize: True
    #   enabled: True
    #   polygon_pub_topic: "velocity_polygon_stop"
    #   velocity_polygons: ["rotation", "translation_forward", "translation_backward", "stopped"]
    #   holonomic: false
    #   rotation:
    #     points: "[[ 0.4,  0.35], [ 0.4,  -0.35],[ -0.4,  -0.35], [ -0.4,  0.35]]"
    #     linear_min: 0.0
    #     linear_max: 0.6
    #     theta_min: -0.8
    #     theta_max: 0.8
    #   translation_forward:
    #     points: "[[ 0.45,  0.35], [ 0.45,  -0.35],[ -0.3,  -0.25], [ -0.3,  0.35]]"
    #     linear_min: 0.0
    #     linear_max: 0.6
    #     theta_min: -0.8
    #     theta_max: 0.8
    #   translation_backward:
    #     points: "[[ 0.3,  0.35], [ 0.3,  -0.35],[ -0.45,  -0.35], [ -0.45,  0.35]]"
    #     linear_min: -1.0
    #     linear_max: 0.0
    #     theta_min: -1.0
    #     theta_max: 1.0
    #   # This is the last polygon to be checked, it should cover the entire range of robot's velocities
    #   # It is used as the stopped polygon when the robot is not moving and as a fallback if the velocity
    #   # is not covered by any of the other sub-polygons
    #   stopped:
    #     points: "[[ 0.35,  0.3], [ 0.35,  -0.3],[ -0.35,  -0.3], [ -0.35,  0.3]]"
    #     linear_min: -1.0
    #     linear_max: 0.6
    #     theta_min: -1.0
    #     theta_max: 0.8


    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "<robot_namespace>/scan_filtered"
      min_height: 0.15
      max_height: 2.0
      enabled: True

docking_server:
  ros__parameters:
    controller_frequency: 50.0
    initial_perception_timeout: 20.0
    wait_charge_timeout: 5.0
    dock_approach_timeout: 30.0
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "<frame_namespace>/base_footprint"
    fixed_frame: "<frame_namespace>/ekf_odom"
    dock_backwards: false
    dock_prestaging_tolerance: 0.5

    # Types of docks
    dock_plugins: ['simple_charging_dock']
    simple_charging_dock:
      plugin: 'opennav_docking::SimpleChargingDock'
      docking_threshold: 0.5 # 0.05
      staging_x_offset: 2.0  # 2.0 

      staging_yaw_offset: -3.8
      use_external_detection_pose: true # true
      use_battery_status: false # true
      use_stall_detection: false # true
      # subscribe_toggle: true

      external_detection_timeout: 10.0
      external_detection_translation_x: 0.0
      external_detection_translation_y: 0.0
      # external_detection_rotation_roll: -1.57
      # external_detection_rotation_pitch: 1.57
      # external_detection_rotation_yaw: 0.0
        # Camera optical frame → ROS convention
      external_detection_rotation_roll: -1.57
      external_detection_rotation_pitch: 0.0 # -1.57     # ← Changed from -1.57
      external_detection_rotation_yaw: -1.57
      filter_coef: 0.0
      # dock_direction: "forward" # "backward"

    # Dock instances
    dock_database: $(find-pkg-share rgt_nav3_launch)/cfg/dock_database.yaml

    controller:
      k_phi: 5.3
      k_delta: 3.15
      beta: 0.4
      lambda: 2.0 #2.0
      v_linear_min: 0.1
      v_linear_max: 0.2
      v_angular_max: 0.7 #0.2      
      # k_phi: 3.0
      # k_delta: 2.0
      # beta: 0.4
      # lambda: 2.0
      # v_linear_min: 0.08
      # v_linear_max: 0.15
      # v_angular_max: 0.3
      slowdown_radius: 1.0
      use_collision_detection: false
      costmap_topic: "<frame_namespace>/local_costmap/costmap_raw"
      footprint_topic: "<frame_namespace>/local_costmap/published_footprint"
      transform_tolerance: 0.1
      projection_time: 5.0
      simulation_step: 0.1
      dock_collision_threshold: 0.3

lidar_filter_node:
  ros__parameters:
    # Robot footprint polygon (x,y pairs in meters)

    footprint: "[[ 0.30,  0.25], [ 0.30,  -0.25],[ -0.30,  -0.25], [ -0.30,  0.25]]"
    # Additional padding around footprint (meters)
    padding: 0.05
    
    # Frame where footprint is defined
    footprint_frame: "<frame_namespace>/base_footprint"
    
    # Topic names
    scan_topic: "<robot_namespace>/scan"
    filtered_topic: "<robot_namespace>/scan_filtered"
