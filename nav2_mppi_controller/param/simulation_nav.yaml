amcl:
  ros__parameters:
    alpha1: 0.02 # 0.02
    alpha2: 0.02
    alpha3: 0.02
    alpha4: 0.02
    alpha5: 0.02
    base_frame_id: "<frame_namespace>/base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 20.0
    laser_min_range: 1.0
    laser_model_type: "likelihood_field"
    max_beams:  100
    max_particles: 4000
    min_particles: 1500
    odom_frame_id: "<frame_namespace>/ekf_odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 1.0
    introspection_mode: "disabled"
    update_min_a: 0.2  # update after big rotation 
    update_min_d: 0.25
    z_hit: 0.5
    z_max: 0.05
    z_rand: 0.5
    z_short: 0.05
    scan_topic: "<robot_namespace>/scan"
    set_initial_pose: true
    initial_pose:
      x: 5.0      # Set to your robot's starting x position
      y: 5.0      # Set to your robot's starting y position  
      z: 0.0      # Usually 0.0 for 2D navigation
      yaw: 0.0    # Set to your robot's starting orientation in radians
    always_reset_initial_pose: false
    
    #qos_overrides:
    #  /sirbot1/scan.subscription:
    #    depth: 150

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: <frame_namespace>/base_footprint
    odom_topic: <robot_namespace>/ekf_odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    # default_nav_to_pose_bt_xml: /opt/ros/jazzy/share/nav2_bt_navigator/behavior_trees/navigate_to_pose_w_replanning_and_recovery.xml # or $(find-pkg-share my_package)/behavior_tree/my_nav_to_pose_bt.xml
    # default_nav_to_pose_bt_xml: /home/rgt/rgt2_ws/src/nav2_bt_navigator/behavior_trees/navigate_w_replanning_speed_narrow_path.xml
    default_nav_to_pose_bt_xml: /home/rgt/rgt2_ws/src/nav2_bt_navigator/behavior_trees/move_aside_narrow_path.xml
    # Path to the wait place definition file
    # wait_place_config_path: "/home/rgt/rgt2_ws/src/nav2_bt_navigator/config/waitplace.yaml"
    # Which key to read inside that file
    # wait_place_name: "location1"
    location_file: /home/rgt/rgt2_ws/src/rgt_navigation3/rgt_nav3_launch/cfg/location.yaml

    navigators: ["navigate_to_pose", "navigate_through_poses"]
    # go_to_wait_place:
    #   plugin: "nav2_bt_navigator::WaitPlanceNavigator"
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      # enable_groot_monitoring: true
      # groot_server_port: 1667
      # groot_zmq_server_port: 1667
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
      # enable_groot_monitoring: true
      # groot_zmq_publisher_port: 1666
      # groot_zmq_server_port: 1667
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.
    
    # plugin_lib_names is used to add custom BT plugins to the executor (vector of strings).
    # Built-in plugins are added automatically
    plugin_lib_names: #["nav2_set_goal_from_location_bt_node", "nav2_human_in_narrow_path_bt_node", "nav2_reset_path_bt_node"]
      - nav2_set_goal_from_location_bt_node
      - nav2_human_in_narrow_path_bt_node
      - nav2_reset_path_bt_node
      - nav2_narrow_path_bt_node
      - nav2_set_costmap_inflation_radius_bt_node
      - nav2_search_local_goal_aside_bt_node
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code
    # SearchLocalGoalAside plugin tuning
    # search_angle_deg : primary direction to search (degrees clockwise from robot heading)
    # search_distance  : how far from the robot to place the candidate goal [m]
    # search_sweep_deg : ± sweep around the primary angle when it is blocked [deg]
    # search_step_deg  : angular step inside the sweep [deg]
    # free_threshold   : costmap cost ≤ this is treated as free [0-100]
    search_local_goal_aside.search_angle_deg: 60.0
    search_local_goal_aside.search_distance: 0.7
    search_local_goal_aside.search_sweep_deg: 45.0
    search_local_goal_aside.search_step_deg: 5.0
    search_local_goal_aside.free_threshold: 65

controller_server:
  ros__parameters:
    controller_frequency: 20.0 # 40
    global_frame: <frame_namespace>/ekf_odom
    robot_base_frame: <frame_namespace>/base_footprint
    odom_topic: <robot_namespace>/ekf_odom
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    search_window: 1.0
    controller_plugins: ["FollowPath", "DWB", "RPP", "MPPI", "GF"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05          # Changed: 0.25 -> 0.05
      yaw_goal_tolerance: 0.08       # Changed: 0.25 -> 0.0873 (5 degrees)
      stateful: True

    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "dwb_core::DWBLocalPlanner"
      # primary_controller: "nav2_mppi_controller::MPPIController"
      angular_dist_threshold: 1.8
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.2
      max_angular_accel: 2.0
      simulate_ahead_time: 1.0 
      debug_trajectory_details: True 
      publish_cost_grid_pc: True 
      rotate_to_heading_once: True 
      rotate_to_goal_heading: True # false
      # plugin: "dwb_core::DWBLocalPlanner"
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.8
      max_vel_y: 0.0
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.8
      min_speed_theta: 0.0
      acc_lim_x: 1.0
      acc_lim_y: 0.0
      acc_lim_theta: 2.5
      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -2.5
      vx_samples: 25
      vy_samples: 5
      vtheta_samples: 40 # 25
      sim_time: 1.0 # 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      xy_goal_tolerance: 0.05
      path_length_tolerance: 1.0
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: True
      limit_vel_cmd_in_traj: False
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "ObstacleFootprint"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      Oscillation.scale: 1.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 36.0 # 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 2.0 #32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

    DWB:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "dwb_core::DWBLocalPlanner"
      # primary_controller: "nav2_mppi_controller::MPPIController"
      angular_dist_threshold: 1.8
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.2
      max_angular_accel: 2.0
      simulate_ahead_time: 1.0 
      debug_trajectory_details: True 
      publish_cost_grid_pc: True 
      rotate_to_heading_once: True 
      rotate_to_goal_heading: True # false
      # plugin: "dwb_core::DWBLocalPlanner"
      # max_global_plan_lookahead_dist: 1.5  # metres of arc-length
      forward_prun_distance: 3.0
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.8
      max_vel_y: 0.0
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.8
      min_speed_theta: 0.0
      acc_lim_x: 1.0
      acc_lim_y: 0.0
      acc_lim_theta: 2.5
      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -2.5
      vx_samples: 25
      vy_samples: 5
      vtheta_samples: 40 # 25
      sim_time: 1.0 # 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      xy_goal_tolerance: 0.05
      path_length_tolerance: 1.0
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: True
      limit_vel_cmd_in_traj: False
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "ObstacleFootprint"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      Oscillation.scale: 1.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 36.0 # 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 2.0 #32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0


    RPP:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.6
      max_linear_accel: 1.5
      max_linear_decel: 2.0
      max_angular_accel: 1.5
      lookahead_dist: 0.55
      min_lookahead_dist: 0.35
      max_lookahead_dist: 0.8
      lookahead_time: 0.5
      rotate_to_heading_angular_vel: 1.0
      transform_tolerance: 0.5

      use_velocity_scaled_lookahead_dist: false
      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: false

      min_speed_xy: 0.1
      max_speed_xy: 0.6
      min_speed_theta: 0.1
      max_angular_vel: 1.0

      regulate_turning_radius: true
      min_turning_radius: 0.3

      allow_reversing: false
      goal_dist_tol: 0.08

    MPPI:
      # plugin: "nav2_rotation_shim_controller::RotationShimController"
      # primary_controller: "nav2_mppi_controller::MPPIController"
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 40 #56
      model_dt: 0.05 # 0.05
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 1.2
      vx_min: -0.35
      vy_max: 0.5
      wz_max: 1.9
      ax_max: 3.0
      ax_min: -3.0
      ay_min: -3.0
      ay_max: 3.0
      az_max: 3.5
      iteration_count: 2
      prune_distance: 3.5 #1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      publish_critics_stats: true 
      # reset_period: 1.0 # (only in Humble)
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: true
      AckermannConstraints:
        min_turning_r: 0.0001  # 0.2 
      critics: ["ObstaclesCritic" ,"ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0 #15.0
        threshold_to_consider: 1.0 #1.0
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 15.0 #10.0
        threshold_to_consider: 0.5
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0 #5.0
        threshold_to_consider: 1.0
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 7.5 # 2.5
        critical_weight: 15.0
        consider_footprint: false
        collision_cost: 10.0
        collision_margin_distance: 0.1
        near_goal_distance: 0.5
      #   inflation_radius: 0.55 # (only in Humble)
      #   cost_scaling_factor: 10.0 # (only in Humble)
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight:  10.0
        critical_cost: 100.0
        consider_footprint: true
        collision_cost: 10000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1 #2
        cost_weight: 15.0 # 15.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 1.0 #0.5
        offset_from_furthest: 20
        use_path_orientations: false #false 
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 15.0
        offset_from_furthest: 5
        threshold_to_consider: 1.2
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        offset_from_furthest:  20 #10
        threshold_to_consider: 1.0
        max_angle_to_furthest: 0.5 #1.0
        mode: 0 #0
      VelocityDeadbandCritic:
        enabled: True
        cost_power: 1
        cost_weight: 35.0
        deadband_velocities: [0.05, 0.05, 0.05]
      # TwirlingCritic:
      #   enabled: true
      #   twirling_cost_power: 1
      #   twirling_cost_weight: 10.0 

    GF:
      plugin: nav2_graceful_controller::GracefulController
      min_lookahead: 0.25
      max_lookahead: 1.0
      initial_rotation: true
      initial_rotation_threshold: 0.75
      prefer_final_rotation: true
      allow_backward: false
      k_phi: 2.0
      k_delta: 1.0
      beta: 0.4
      lambda: 2.0
      v_linear_min: 0.1
      v_linear_max: 0.5
      v_angular_max: 5.0
      v_angular_min_in_place: 0.25
      slowdown_radius: 1.5    

local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 10.0
      map_topic: '<robot_namespace>/map_navigation'
      global_frame:  <frame_namespace>/ekf_odom 
      robot_base_frame: <frame_namespace>/base_footprint
      rolling_window: true
      width: 5
      height: 5
      resolution: 0.025
      #robot_radius: 0.22
      footprint: "[[ 0.30,  0.25], [ 0.30,  -0.25],[ -0.30,  -0.25], [ -0.30,  0.25]]"  # radius 0.39 
      plugins: [ "static_layer", "obstacle_layer", "inflation_layer" ]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.45
      social_layer:
        plugin: "nav2_social_costmap_plugin::SocialLayer"
        people_topic: "people"
        cutoff: 10.0          # cost below which cells are ignored
        amplitude: 200.0      # peak cost at person's location
        covar:  0.25          # Gaussian variance (spread of inflation)
        factor: 5.0
        use_passing: False
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: "scan" 
        track_unknown_space: True          # Better clearing behavior
        scan:
          topic: <robot_namespace>/scan_filtered
          clearing: True                   # ← Essential for clearing old obstacles
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          max_obstacle_height: 2.0
          raytrace_max_range: 4.0          # ← Generous clearing range
          raytrace_min_range: 0.0
          inf_is_valid: True
        top_camera:
          topic: <robot_namespace>/camera1/depth/points
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 3.0
          obstacle_min_range: 0.5
          min_obstacle_height: 0.5
          max_obstacle_height: 2.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
        bottom_camera:
          topic: <robot_namespace>/camera2/depth/points
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          min_obstacle_height: 0.5
          max_obstacle_height: 2.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0

      # voxel_layer:
      #   plugin: "nav2_costmap_2d::VoxelLayer"
      #   enabled: True
      #   publish_voxel_map: True
      #   origin_z: 0.0
      #   z_resolution: 0.2
      #   z_voxels: 10
      #   min_obstacle_height: 0.0
      #   max_obstacle_height: 2.0
      #   mark_threshold: 0
      #   observation_sources: realsense1
      #   realsense1:
      #     topic: <robot_namespace>/camera1/depth/points
      #     raytrace_min_range: 0.05
      #     raytrace_max_range: 1.25
      #     obstacle_min_range: 0.05
      #     obstacle_max_range: 1.25
      #     min_obstacle_height: 0.0
      #     max_obstacle_height: 2.0
      #     clearing: True
      #     marking: True
      #     data_type: "PointCloud2"          
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      map_topic: '<robot_namespace>/map_navigation'
      robot_base_frame: <frame_namespace>/base_footprint
      #robot_radius: 0.22
      footprint: "[[ 0.30,  0.25], [ 0.30,  -0.25],[ -0.30,  -0.25], [ -0.30,  0.25]]" 
      footprint_padding: 0.01
      resolution: 0.025
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan 
        scan:
          # '<robot_namespace>' keyword shall be replaced with 'namespace' where user defined.
          # It doesn't need to start with '/'
          topic: <robot_namespace>/scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
        top_camera:
          topic: <robot_namespace>/camera1/depth/points
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 8.0 #3.0
          obstacle_min_range: 0.5
          min_obstacle_height: 0.5
          max_obstacle_height: 3.0 #2.0
          raytrace_max_range: 10.0 #4.0
          raytrace_min_range: 0.0
        bottom_camera:
          topic: <robot_namespace>/camera2/depth/points
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 3.0
          obstacle_min_range: 0.1
          min_obstacle_height: 0.5
          max_obstacle_height: 2.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.55
      always_send_full_costmap: True
# The yaml_filename does not need to be specified since it going to be set by defaults in launch.
# If you'd rather set it in the yaml, remove the default "map" value in the tb3_simulation_launch.py
# file & provide full path to map below. If CLI map configuration or launch default is provided, that will be used.
# map_server:
#   ros__parameters:
#     yaml_filename: ""

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    costmap_update_timeout: 2.0
    map_topic: '<robot_namespace>/map_navigation'
    planner_plugins: ["GridBased", "NarrowPlanner"]
    GridBased:
      # plugin: "nav2_smac_planner::SmacPlannerHybrid"
      plugin: "nav2_navfn_planner::NavfnPlanner"
      # plugin: "rgt_nav3_router::GraphRouter"
      # interpolation_resolution: 0.1
      # tolerance: 0.01
      # use_astar: False
      # allow_unknown: true
      # use_final_approach_orientation_: True 
    NarrowPlanner:
      # plugin: "nav2_smac_planner::SmacPlannerHybrid"
      # plugin: "nav2_navfn_planner::NavfnPlanner"
      plugin: "rgt_nav3_router::GraphRouter"
      # interpolation_resolution: 0.1
      # tolerance: 0.01
      # use_astar: False
      # allow_unknown: true
      # use_final_approach_orientation_: True 

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    # local_costmap_topic: <robot_namespace>/local_costmap/costmap_raw
    # global_costmap_topic: <robot_namespace>/global_costmap/costmap_raw
    # local_footprint_topic: <robot_namespace>/local_costmap/published_footprint
    # global_footprint_topic: <robot_namespace>/global_costmap/published_footprint
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint

    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: <frame_namespace>/ekf_odom
    global_frame: map
    robot_base_frame: <frame_namespace>/base_footprint
    odom_frame_id: "<frame_namespace>/ekf_odom"
    odom_topic: "<robot_namespace>/ekf_odom"
    transform_tolerance: 0.1
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: -1.0
    rotational_acc_lim: 1.5

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: True
      waypoint_pause_duration: 200

velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0 #20
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 1.0]      # [linear, lateral, angular]
    min_velocity: [-1.0, 0.0, -1.0]
    max_accel: [0.4, 0.0, 1.5] #[0.4, 0.0, 1.5]         # Your linear accel limit
    max_decel: [-0.8, 0.0, -1.5]  #[-0.8, 0.0, -1.5]       # Your linear decel limit
    odom_topic: "<robot_namespace>/ekf_odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

# velocity_filter: Takes collision_monitor output and outputs to filtered_key_vel
# velocity_filter:
#   ros__parameters:
#     smoothing_frequency: 20.0
#     scale_velocities: false
#     feedback: "OPEN_LOOP"
#     max_velocity: [1.0, 0.0, 1.0]      # [linear, lateral, angular]
#     min_velocity: [-1.0, 0.0, -1.0]
#     max_accel: [0.4, 0.0, 1.5]
