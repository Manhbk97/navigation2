amcl:
  ros__parameters:
    alpha1: 0.02 # 0.02
    alpha2: 0.02
    alpha3: 0.02
    alpha4: 0.02
    alpha5: 0.2
    base_frame_id: "<frame_namespace>/base_footprint"
    beam_skip_distance: 0.5
    beam_skip_error_threshold: 0.9
    beam_skip_threshold: 0.3
    do_beamskip: false
    global_frame_id: "map"
    lambda_short: 0.1
    laser_likelihood_max_dist: 2.0
    laser_max_range: 10.0
    laser_min_range: 0.15
    laser_model_type: "likelihood_field"
    max_beams: 160
    max_particles: 7000 # 7000
    min_particles: 1000
    odom_frame_id: "<frame_namespace>/ekf_odom"
    pf_err: 0.05
    pf_z: 0.99
    recovery_alpha_fast: 0.0
    recovery_alpha_slow: 0.0
    resample_interval: 1
    robot_model_type: "nav2_amcl::DifferentialMotionModel"
    save_pose_rate: 0.5
    sigma_hit: 0.2
    tf_broadcast: true
    transform_tolerance: 0.5 # 1.0 
    introspection_mode: "disabled"
    update_min_a: 0.2
    update_min_d: 0.1
    z_hit: 0.9 # 0.5
    z_max: 0.05
    z_rand: 0.05
    z_short: 0.05
    scan_topic: <robot_namespace>/scan
    set_initial_pose: true
    initial_pose:
      x: 0.0      # Set to your robot's starting x position
      y: 0.0      # Set to your robot's starting y position  
      z: 0.0      # Usually 0.0 for 2D navigation
      yaw: 0.0    # Set to your robot's starting orientation in radians
    always_reset_initial_pose: false
    
    #qos_overrides:
    #  /sirbot1/scan.subscription:
    #    depth: 150

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: <frame_namespace>/base_footprint
    odom_topic: <robot_namespace>/ekf_odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    # 'default_nav_through_poses_bt_xml' and 'default_nav_to_pose_bt_xml' are use defaults:
    # nav2_bt_navigator/navigate_to_pose_w_replanning_and_recovery.xml
    # nav2_bt_navigator/navigate_through_poses_w_replanning_and_recovery.xml
    # They can be set here or via a RewrittenYaml remap from a parent launch file to Nav2.
    
    # plugin_lib_names is used to add custom BT plugins to the executor (vector of strings).
    # Built-in plugins are added automatically
    # plugin_lib_names: []


    error_code_names:
      - compute_path_error_code
      - follow_path_error_code


controller_server:
  ros__parameters:
    controller_frequency: 20.0
    global_frame: <frame_namespace>/ekf_odom
    robot_base_frame: <frame_namespace>/base_footprint
    odom_topic: <robot_namespace>/ekf_odom

    progress_checker_plugins: ["progress_checker"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.2
      movement_time_allowance: 15.0

    goal_checker_plugins: ["goal_checker"]
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.1 # 0.1          # Changed: 0.25 -> 0.05
      yaw_goal_tolerance: 0.1 # Changed: 0.25 -> 0.0873 (5 degrees)
      stateful: True
    controller_plugins: ["FollowPath"]

    FollowPath:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"

      desired_linear_vel: 0.6

      max_linear_accel: 1.5
      max_linear_decel: 2.0
      max_angular_accel: 1.5

      lookahead_dist: 0.55
      min_lookahead_dist: 0.35
      max_lookahead_dist: 0.8
      lookahead_time: 0.5

      rotate_to_heading_angular_vel: 1.0
      transform_tolerance: 0.5

      use_velocity_scaled_lookahead_dist: false
      use_regulated_linear_velocity_scaling: false #true
      use_cost_regulated_linear_velocity_scaling: false

      min_speed_xy: 0.1
      max_speed_xy: 0.6
      min_speed_theta: 0.1
      max_angular_vel: 1.0

      regulate_turning_radius: true
      min_turning_radius: 0.3

      allow_reversing: false

      goal_dist_tol: 0.08
      
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 10.0
      publish_frequency: 5.0
      map_topic: '<robot_namespace>/map_navigation'
      global_frame: <frame_namespace>/ekf_odom
      robot_base_frame: <frame_namespace>/base_footprint
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.025
      #robot_radius: 0.22
      footprint: <footprint> #"[[ 0.30,  0.25], [ 0.30,  -0.25],[ -0.30,  -0.25], [ -0.30,  0.25]]"
      plugins: ["obstacle_layer", "inflation_layer"]
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.45
        
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: "scan top_camera bottom_camera"
        track_unknown_space: True          # Better clearing behavior
        scan:
          topic: <robot_namespace>/scan_filtered
          clearing: True                   # ← Essential for clearing old obstacles
          marking: True
          data_type: "LaserScan"
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
          max_obstacle_height: 2.0
          raytrace_max_range: 4.0          # ← Generous clearing range
          raytrace_min_range: 0.0
          inf_is_valid: True
        top_camera:
          topic: <robot_namespace>/camera1/depth/points_filtered
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          min_obstacle_height: 0.01
          max_obstacle_height: 2.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
        bottom_camera:
          topic: <robot_namespace>/camera2/depth/points_filtered
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          min_obstacle_height: 0.01
          max_obstacle_height: 2.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
          
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      always_send_full_costmap: True

global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 1.0
      publish_frequency: 1.0
      global_frame: map
      map_topic: '<robot_namespace>/map_navigation'
      robot_base_frame: <frame_namespace>/base_footprint
      #robot_radius: 0.22
      footprint: <footprint> #"[[ 0.30,  0.25], [ 0.30,  -0.25],[ -0.30,  -0.25], [ -0.30,  0.25]]"
      footprint_padding: 0.01
      resolution: 0.025
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: "scan top_camera bottom_camera"
        track_unknown_space: True          # Better clearing behavior
        scan:
          topic: <robot_namespace>/scan_filtered
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          raytrace_max_range: 3.0
          raytrace_min_range: 0.0
          obstacle_max_range: 2.5
          obstacle_min_range: 0.0
        top_camera:
          topic: <robot_namespace>/camera1/depth/points_filtered
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          min_obstacle_height: 0.01
          max_obstacle_height: 2.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
        bottom_camera:
          topic: <robot_namespace>/camera2/depth/points_filtered
          clearing: True
          marking: True
          data_type: "PointCloud2"
          obstacle_max_range: 3.0
          obstacle_min_range: 0.0
          min_obstacle_height: 0.01
          max_obstacle_height: 2.0
          raytrace_max_range: 4.0
          raytrace_min_range: 0.0
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        map_subscribe_transient_local: True
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 5.0
        inflation_radius: 0.55
      always_send_full_costmap: True

# The yaml_filename does not need to be specified since it going to be set by defaults in launch.
# If you'd rather set it in the yaml, remove the default "map" value in the tb3_simulation_launch.py
# file & provide full path to map below. If CLI map configuration or launch default is provided, that will be used.
# map_server:
#   ros__parameters:
#     yaml_filename: ""

map_saver:
  ros__parameters:
    save_map_timeout: 5.0
    free_thresh_default: 0.25
    occupied_thresh_default: 0.65
    map_subscribe_transient_local: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 5.0
    costmap_update_timeout: 1.0
    map_topic: '<robot_namespace>/map_navigation'
    planner_plugins: ["GridBased"]
    GridBased:
      #plugin: "nav2_smac_planner::SmacPlannerHybrid"
      plugin: "nav2_navfn_planner::NavfnPlanner"
      #plugin: "rgt_nav3_router::GraphRouter"
      interpolation_resolution: 0.1
      tolerance: 0.01
      use_astar: False
      allow_unknown: true

smoother_server:
  ros__parameters:
    smoother_plugins: ["simple_smoother"]
    simple_smoother:
      plugin: "nav2_smoother::SimpleSmoother"
      tolerance: 1.0e-10
      max_its: 1000
      do_refinement: True

behavior_server:
  ros__parameters:
    local_costmap_topic: local_costmap/costmap_raw
    global_costmap_topic: global_costmap/costmap_raw
    local_footprint_topic: local_costmap/published_footprint
    global_footprint_topic: global_costmap/published_footprint
    cycle_frequency: 10.0
    behavior_plugins: ["spin", "backup", "drive_on_heading", "assisted_teleop", "wait"]
    spin:
      plugin: "nav2_behaviors::Spin"
    backup:
      plugin: "nav2_behaviors::BackUp"
    drive_on_heading:
      plugin: "nav2_behaviors::DriveOnHeading"
    wait:
      plugin: "nav2_behaviors::Wait"
    assisted_teleop:
      plugin: "nav2_behaviors::AssistedTeleop"
    local_frame: <frame_namespace>/ekf_odom
    global_frame: map
    robot_base_frame: <frame_namespace>/base_footprint
    odom_frame_id: "<frame_namespace>/ekf_odom"
    odom_topic: "<robot_namespace>/ekf_odom"
    transform_tolerance: 0.5
    simulate_ahead_time: 2.0
    max_rotational_vel: 1.0
    min_rotational_vel: -1.0
    rotational_acc_lim: 1.5

waypoint_follower:
  ros__parameters:
    loop_rate: 20
    stop_on_failure: false
    action_server_result_timeout: 900.0
    waypoint_task_executor_plugin: "wait_at_waypoint"
    wait_at_waypoint:
      plugin: "nav2_waypoint_follower::WaitAtWaypoint"
      enabled: False
      waypoint_pause_duration: 200
    
velocity_smoother:
  ros__parameters:
    smoothing_frequency: 20.0
    scale_velocities: false
    feedback: "OPEN_LOOP"
    max_velocity: [1.0, 0.0, 1.5]      # [linear, lateral, angular]
    min_velocity: [-1.0, 0.0, -1.5]
    max_accel: [0.4, 0.0, 1.5]         # Your linear accel limit
    max_decel: [-0.8, 0.0, -1.5]       # Your linear decel limit
    odom_topic: "<robot_namespace>/ekf_odom"
    odom_duration: 0.1
    deadband_velocity: [0.0, 0.0, 0.0]
    velocity_timeout: 1.0

collision_monitor:
  ros__parameters:
    base_frame_id: "<frame_namespace>/base_footprint"
    odom_frame_id: "<frame_namespace>/ekf_odom"
    cmd_vel_in_topic: "cmd_vel_smoothed"
    cmd_vel_out_topic: "key_vel"
    state_topic: "collision_monitor_state"
    transform_tolerance: 0.5
    source_timeout: 2.0
    base_shift_correction: True
    stop_pub_timeout: 2.0

    # Polygons represent zone around the robot for "stop", "slowdown" and "limit" action types,
    # and robot footprint for "approach" action type. https://docs.nav2.org/tutorials/docs/using_collision_monitor.html
    polygons: ["PolygonStop", "PolygonSlow"]
    PolygonStop:
      type: "polygon"
      #points: "[[ 0.35,  0.3], [ 0.35,  -0.3],[ -0.35,  -0.3], [ -0.35,  0.3]]"
      #points: "[[ 0.3,  0.28], [ 0.30,  -0.28],[ -0.30,  -0.28], [ -0.30,  0.28]]"
      points: "[  [0.29927, -0.10057], [0.28391, -0.17596], [0.24148, -0.2397], [0.19787, -0.26604], [-0.19787, -0.26604], [-0.24148, -0.2397], [-0.28391, -0.17596], [-0.29927, -0.10057], [-0.29927, 0.10057], [-0.28391, 0.17596], [-0.24148, 0.2397], [-0.19787, 0.26604], [0.19787, 0.26604], [0.24148, 0.2397], [0.28391, 0.17596], [0.29927, 0.10057]]"
      action_type: "stop"
      min_points: 4  # max_points: 3 for Humble
      visualize: True
      polygon_pub_topic: "polygon_stop"
    PolygonSlow:
      type: "polygon"
      #points: "[[ 0.4,  0.35], [ 0.4,  -0.35],[ -0.4,  -0.35], [ -0.4,  0.35]]"
      points: "[[ 0.45,  0.35], [ 0.45,  -0.35],[ -0.45,  -0.35], [ -0.45,  0.35]]"
      action_type: "slowdown"
      min_points: 4  # max_points: 3 for Humble
      slowdown_ratio: 0.7
      visualize: True
      polygon_pub_topic: "polygon_slowdown"

    observation_sources: ["scan"]
    scan:
      type: "scan"
      topic: "<robot_namespace>/scan_filtered"
      min_height: 0.15
      max_height: 2.0
      enabled: True


safety_filter:
  ros__parameters:
    cmd_vel_in_topic: "key_vel"
    cmd_vel_out_topic: "filtered_key_vel"
    pause_topic: "pause"
    estop_topic: "estop"
    imu_topic: "mcu/imu_raw"
    slope_threshold_degrees: 5.0
    control_frequency: 20.0
    cmd_timeout: 0.5
    pause_flat_timeout: 2.0 
    
docking_server:
  ros__parameters:
    controller_frequency: 20.0
    initial_perception_timeout: 5.0
    wait_charge_timeout: 5.0 # Used only if use_battery_status: true
    dock_approach_timeout: 60.0  # Max time allowed to physically dock
    undock_linear_tolerance: 0.05
    undock_angular_tolerance: 0.1
    max_retries: 3
    base_frame: "<frame_namespace>/base_footprint"
    fixed_frame: "<frame_namespace>/ekf_odom"
    navigate_to_staging_pose: true
#   dock_backwards: false
    dock_prestaging_tolerance: 0.5

    # Types of docks
    dock_plugins: ['FrontDock', 'ChargeDock']
    FrontDock:
      plugin: 'opennav_docking::SimpleNonChargingDock'
      docking_threshold: 0.05
      staging_x_offset: -0.85
      dock_direction: "forward"
      use_external_detection_pose: true
      use_battery_status: false # true
      use_stall_detection: false # true

      external_detection_timeout: 10.0
      external_detection_translation_x: 0.0
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: 0.0
      external_detection_rotation_pitch: 0.0
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1

    ChargeDock:
      plugin: 'opennav_docking::SimpleNonChargingDock'
      docking_threshold: 0.1
      staging_x_offset: -0.75
      use_external_detection_pose: true
      use_battery_status: false # true
      use_stall_detection: false # true

      external_detection_timeout: 10.0
      external_detection_translation_x: 0.0
      external_detection_translation_y: 0.0
      external_detection_rotation_roll: 0.0
      external_detection_rotation_pitch: 0.0
      external_detection_rotation_yaw: 0.0
      filter_coef: 0.1   
      
    # Dock instances
    docks: ['jvm_dock']  # Dock Positions
    jvm_dock:
      type: 'FrontDock'
      frame: map
      pose: [5.0, 8.0, 0.0]

    controller:
      k_phi: 0.3
      k_delta: 5.0 # 8.0
      v_linear_min: 0.15
      v_linear_max: 0.15
      v_angular_max: 0.5
      slowdown_radius: 0.5
      rotate_to_heading_angular_vel: 1.2
      rotate_to_heading_max_angular_accel: 0.5
      use_collision_detection: true
      # costmap_topic: "local_costmap/costmap_raw"
      # footprint_topic: "local_costmap/published_footprint"
      transform_tolerance: 0.3
      projection_time: 0.15 # 1.0
      simulation_time_step: 0.1
      dock_collision_threshold: 0.1 # 0.1

charger_dock_detector:
  ros__parameters:
    laser_topic: "scan_filtered"
    task_progress: "task_progress"

    # Polar ROI Parameters
    roi_range_min: 0.0
    roi_range_max: 1.2
    roi_angle_min: -80.0
    roi_angle_max: 80.0

    # Line Segmentation
    min_line_points: 3
    min_line_length: 0.05
    split_threshold: 0.02

    # CRITICAL: Wide V Angle Filter (135-145 deg)
    target_angle_min: 20.0 #20.0
    target_angle_max: 80.0 #80.0

    # Length Filter (Based on 10.7cm Arms)
    min_arm_length: 0.07
    max_arm_length: 0.15
    arm_length_tolerance: 0.08

    endpoint_gap_max: 0.08
    apex_proximity_tolerance: 0.10
    standoff_distance: 0.30 # detected_dock_pose distance from apex

    smoothing_window_size: 1
    min_consecutive_detections: 1

    # Orientation Check
    min_opposing_alignment: 0.2

    # Tracking
    max_tracking_radius: 0.50
    max_lost_frames: 25

    enable_visualization: True

    is_docking_active: False #for testing true, real robot false
    use_sim_time: False
    debug_mode: False #for test true

jvm_dock_detector:
  ros__parameters:
    dock_width: 0.8
    dock_length: 1.0
    width_tolerance: 0.5
    lookahead_distance: 0.3
    intensity_threshold: 210.0  # Above this = reflector
    min_intensity_points: 1    # Min points per marker
    marker_cluster_radius: 0.08 # Max 8cm cluster (more lenient
    scan_topic: 'scan_filtered'
    robot_frame: 'base_footprint'
    lateral_tolerance: 0.05  # 5cm lateral tolerance to consider "aligned"
    target_from_dock_back: 0.45 # Target pose from back wall
    debug_mode: False ## debug mode


lidar_filter_node:
  ros__parameters:
    # Robot footprint polygon (x,y pairs in meters)

    footprint: <footprint> #"[[ 0.30,  0.25], [ 0.30,  -0.25],[ -0.30,  -0.25], [ -0.30,  0.25]]"
    # Additional padding around footprint (meters)
    padding: 0.05
    
    # Frame where footprint is defined
    footprint_frame: "<frame_namespace>/base_footprint"
    
    # Topic names
    scan_topic: "<robot_namespace>/scan"
    filtered_topic: "<robot_namespace>/scan_filtered"

sensor_filter_node:
  ros__parameters:
    # === COMMON PARAMETERS ===
    footprint: <footprint> #"[[ 0.30,  0.25], [ 0.30,  -0.25],[ -0.30,  -0.25], [ -0.30,  0.25]]"
    padding: 0.05
    footprint_frame: "<frame_namespace>/base_footprint"
    depth_output_topic: "depth_filtered"
    scan_output_topic: "scan_filtered"
    
    # === SENSOR LIST ===
    #sensors: ["2d_lidar", "top_camera", "bottom_camera"]
    sensors: ["2d_lidar"]

    # 2D LiDAR Sensor Configuration
    2d_lidar:
      type: "lidar_2d"
      topic_in: "scan"
      topic_out: "scan_filtered"
      filters: ["footprint_filter", "angular_filter", "ground_filter", "density_filter"]
      
      footprint_filter:
        enabled: true
        footprint: <footprint> #"[[ 0.30,  0.25], [ 0.30,  -0.25],[ -0.30,  -0.25], [ -0.30,  0.25]]"
        height: 1.5
        padding: 0.05
      
      angular_filter:
        enabled: true
        #regions: "[[0.78, 0.0872665], [-0.78, 0.0872665], [2.35, 0.0872665], [-2.35, 0.0872665]]"
        regions: "[[3.14, 2.0]]"
      
      ground_filter:
        enabled: false
        ground_threshold: 0.05
        slope_tolerance: 0.08
      
      density_filter:
        enabled: false
        max_points: 1
        voxel_size: 0.075
    
    # Top Depth Camera Configuration
    top_camera:
      type: "depth_camera"
      topic_in: "camera1/depth/points"
      topic_out: "camera1/depth/points_filtered"
      filters: ["footprint_filter", "fov_filter", "ground_filter", "ceiling_filter", "density_filter"]
      
      footprint_filter:
        enabled: true
        footprint: <footprint> #"[[ 0.30,  0.25], [ 0.30,  -0.25],[ -0.30,  -0.25], [ -0.30,  0.25]]"
        height: 1.5
        padding: 0.05
      
      fov_filter:
        enabled: true
        vertical_fov: "[[-1.57, 1.57]]"
        horizontal_fov: "[[-1.57, 1.57]]"
      
      ground_filter:
        enabled: true
        ground_threshold: 0.05
        slope_tolerance: 0.08
      
      ceiling_filter:
        enabled: true
        ceiling_threshold: 4.0
        slope_tolerance: 0.0
      
      density_filter:
        enabled: true
        max_points: 1
        voxel_size: 0.075
    
    # Bottom Depth Camera Configuration
    bottom_camera:
      type: "depth_camera"
      topic_in: "camera2/depth/points"
      topic_out: "camera2/depth/points_filtered"
      lazy_publish: true
      filters: ["footprint_filter", "fov_filter", "ground_filter", "ceiling_filter", "density_filter"]
      
      footprint_filter:
        enabled: true
        footprint: <footprint> #"[[ 0.30,  0.25], [ 0.30,  -0.25],[ -0.30,  -0.25], [ -0.30,  0.25]]"
        height: 1.5
        padding: 0.05
      
      fov_filter:
        enabled: true
        vertical_fov: "[[-1.57, 1.57]]"
        horizontal_fov: "[[-1.57, 1.57]]"
      
      ground_filter:
        enabled: true
        ground_threshold: 0.05
        slope_tolerance: 0.08
      
      ceiling_filter:
        enabled: true
        ceiling_threshold: 4.0
        slope_tolerance: 0.0
      
      density_filter:
        enabled: true
        max_points: 1
        voxel_size: 0.075
        
interface_node:
  ros__parameters:
    update_rate: 10.0
    dock_distance: 0.9