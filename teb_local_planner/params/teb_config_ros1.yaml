# TebLocalPlannerROS:
# sirbo1/test_optim_node:
teb_config:
 teb_sg_dist: 2.5 # 2.0
 teb_d_margin: 0.03   
 teb_linear_acc: 0.25
 odom_topic: tf_odom
 controller_frequency_: 10.0
 distance_end_waypoint_threshold: 0.4 #0.3
 teb_angle_threshold: 2.9 #3.0
 no_try_plans: 10
 heading_threshold: 1.0
 # Trajectory
  
 teb_autosize: True
 dt_ref: 0.3
 dt_hysteresis: 0.1
 max_samples: 500

 global_plan_overwrite_orientation: false
 allow_init_with_backwards_motion: false

 max_global_plan_lookahead_dist: 2.0 #1.8
 global_plan_viapoint_sep: 1.0 #0.4
 via_points_ordered: true
 global_plan_prune_distance: 0.5
 exact_arc_length: true
 feasibility_check_no_poses: 13.0
 publish_feedback: False
 force_reinit_new_goal_dist: 0.6 #1.3 
 force_reinit_new_goal_angular: 0.8 # 1.5
 prevent_look_ahead_poses_near_goal: 2

#  # Robot
         
 max_vel_x: 0.6
 max_vel_x_backwards: 0.1
 max_vel_y: 0.0
 max_vel_theta: 0.8 # the angular velocity is alsreo bounded by min_turning_radius in case of a carlike robot (r = v / omega)
 acc_lim_x: 0.5
 acc_lim_theta: 0.2


 footprint_model: # types: "point", "circular", "two_circles", "line", "polygon"
   type: "circular"
   radius: 0.23 # for type "circular"
   line_start: [-0.2, 0.0] # for type "line"
   line_end: [0.2, 0.0] # for type "line"
   front_offset: 0.15 # for type "two_circles"
   front_radius: 0.21 # for type "two_circles"
   rear_offset: 0.15 # for type "two_circles"
   rear_radius: 0.21 # for type "two_circles"
   vertices: [[0.255, 0.1365], [0.241, 0.1781], [0.185, 0.2065], [-0.185, 0.2065],  [-0.2413, 0.1781], [-0.255, 0.1365], [-0.255, -0.1365], [-0.2413, -0.1781], [-0.185, -0.2065], [0.185, -0.2065],  [0.2413, -0.1781], [0.255,  -0.1365], [ 0.255,  0.1365]]
   #vertices: [[0.28, 0.0], [0.28, 0.105], [0.2, 0.105], [0.15,  0.17], [0.103, 0.205], [0.0,   0.23], [-0.103, 0.205], [-0.15, 0.17], [-0.2, 0.105], [-0.23, 0.0], [-0.2, -0.105], [-0.15, -0.17], [-0.103,-0.205], [ 0.0, -0.23], [ 0.103,-0.205], [ 0.15, -0.17], [ 0.2, -0.105], [ 0.28, -0.105], [ 0.28, 0.0]]
 # GoalTolerance
    
 xy_goal_tolerance: 0.2
 yaw_goal_tolerance: 3.2
 trans_stopped_vel: 0.05
 theta_stopped_vel: 0.05
 free_goal_vel: True
 complete_global_plan: True
    
#  # Obstacles
    

 min_obstacle_dist: 0.3 #0.35 This value must also include our robot's expansion, since footprint_model is set to "line".
 inflation_dist: 0.4
 costmap_obstacles_behind_robot_dist: 0.8

 obstacle_poses_affected: 15
 obstacle_proximity_ratio_max_vel: 0.5
 obstacle_proximity_lower_bound: 1.3
 obstacle_proximity_upper_bound: 2.0
 dynamic_obstacle_inflation_dist: 0.1
 legacy_obstacle_association: True
 obstacle_association_cutoff_factor: 2.0
 obstacle_association_force_inclusion_factor: 1.5
 
 include_dynamic_obstacles: False
 include_costmap_obstacles: True
 costmap_converter_plugin: "costmap_converter::CostmapToPolygonsDBSMCCH"
 costmap_converter_rate: 10.0
 costmap_converter_spin_thread: true
#  costmap_converter_plugin: ""
#  costmap_converter_spin_thread: True
#  costmap_converter_rate: 5

#  Optimization
    
 no_inner_iterations: 4
 no_outer_iterations: 3
 optimization_activate: True
 optimization_verbose: False
 penalty_epsilon: 0.01
 obstacle_cost_exponent: 2
 weight_max_vel_x: 1
 weight_max_vel_y: 0.0
 weight_max_vel_theta: 1
 weight_acc_lim_x: 1.0
 weight_acc_lim_y: 0.0

 weight_acc_lim_theta: 1.0
 weight_kinematics_nh: 1000
 weight_kinematics_forward_drive: 1000.0
 weight_kinematics_turning_radius: 0.0
 weight_optimaltime: 0.8 #1.0 # must be > 0
 weight_shortest_path: 0.5 #1.0
 weight_obstacle: 50.0
 weight_inflation: 0.4
 weight_dynamic_obstacle: 10 # not in use yet
 weight_dynamic_obstacle_inflation: 0.2
 weight_viapoint: 5 #10.0
 weight_adapt_factor: 1 #2.0

#  # Homotopy Class Planner

 enable_homotopy_class_planning: true
 enable_multithreading: True
 max_number_classes: 2
 selection_cost_hysteresis: 1.5
 selection_prefer_initial_plan: 0.95
 selection_obst_cost_scale: 1.0
 selection_alternative_time_cost: True
 simple_exploration: false
 roadmap_graph_no_samples: 35
 roadmap_graph_area_width: 1.5
 roadmap_graph_area_length_scale: 2.5
 h_signature_prescaler: 0.5
 h_signature_threshold: 0.1
 obstacle_heading_threshold: 0.5
 switching_blocking_period: 3.0
 viapoints_all_candidates: true
 delete_detours_backwards: True
 max_ratio_detours_duration_best_duration: 2.0
 divergence_detection_enable : True
 visualize_hc_graph: false
#  visualize_with_time_as_z_axis_scale: False
 use_proportional_saturation: True
# Recovery

 shrink_horizon_backup: True
 shrink_horizon_min_duration: 10
 oscillation_recovery: false
 oscillation_v_eps: 0.1
 oscillation_omega_eps: 0.1
 oscillation_recovery_min_duration: 10
 oscillation_filter_duration: 10
 divergence_detection_max_chi_squared: 16.0
#  robot_inscribed_radius_: 0.2
#  robot_circumscribed_radius_: 0.35