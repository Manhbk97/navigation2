bt_navigator:
  ros__parameters:
    enable_stamped_cmd_vel: false
    global_frame: map
    robot_base_frame: base_link
    odom_topic: /bcr_bot/odom
    bt_loop_duration: 10
    default_server_timeout: 20
    wait_for_service_timeout: 1000
    action_server_result_timeout: 900.0
    # default_nav_to_pose_bt_xml: /home/rgt/ros2_robot_ws/src/rgt_behavior_plugins/behavior_trees/HumanInNarrowPath.xml
    # default_nav_to_pose_bt_xml: /home/rgt/ros2_robot_ws/src/rgt_behavior_plugins/behavior_trees/overwrite_controller/navigate_w_replanning_speed_narrow_path_automate_velocity.xml
    default_nav_to_pose_bt_xml: /home/rgt/ros2_robot_ws/src/rgt_behavior_plugins/behavior_trees/goal_arrival/navigate_to_pose_w_infinite_replanning_and_near_goal_recovery03.xml
    navigators: ["navigate_to_pose", "navigate_through_poses"]
    location_file: /home/rgt/ros2_robot_ws/src/bcr_bot/config/location.yaml
    plugin_lib_names:
      - rgt_behavior_plugins
    navigate_to_pose:
      plugin: "nav2_bt_navigator::NavigateToPoseNavigator"
      enable_groot_monitoring: true
      groot_server_port: 1667
    navigate_through_poses:
      plugin: "nav2_bt_navigator::NavigateThroughPosesNavigator"
    error_code_names:
      - compute_path_error_code
      - follow_path_error_code


controller_server:
  ros__parameters:
    controller_frequency: 20.0 # 40
    global_frame: odom
    robot_base_frame: base_link
    odom_topic: /bcr_bot/odom
    progress_checker_plugins: ["progress_checker"]
    goal_checker_plugins: ["goal_checker"]
    search_window: 1.0
    controller_plugins: ["FollowPath", "DWB", "RPP", "MPPI", "GF"]
    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.5
      movement_time_allowance: 10.0
    goal_checker:
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.05          # Changed: 0.25 -> 0.05
      yaw_goal_tolerance: 0.08       # Changed: 0.25 -> 0.0873 (5 degrees)
      stateful: True

    FollowPath:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "dwb_core::DWBLocalPlanner"
      # primary_controller: "nav2_mppi_controller::MPPIController"
      angular_dist_threshold: 1.8
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.2
      max_angular_accel: 2.0
      simulate_ahead_time: 1.0 
      debug_trajectory_details: True 
      publish_cost_grid_pc: True 
      rotate_to_heading_once: True 
      rotate_to_goal_heading: True # false
      # plugin: "dwb_core::DWBLocalPlanner"
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.8
      max_vel_y: 0.0
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.8
      min_speed_theta: 0.0
      acc_lim_x: 1.0
      acc_lim_y: 0.0
      acc_lim_theta: 2.5
      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -2.5
      vx_samples: 25
      vy_samples: 5
      vtheta_samples: 40 # 25
      sim_time: 1.0 # 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      xy_goal_tolerance: 0.05
      path_length_tolerance: 1.0
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: True
      limit_vel_cmd_in_traj: False
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "ObstacleFootprint"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      Oscillation.scale: 1.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 36.0 # 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 2.0 #32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

    DWB:
      plugin: "nav2_rotation_shim_controller::RotationShimController"
      primary_controller: "dwb_core::DWBLocalPlanner"
      # primary_controller: "nav2_mppi_controller::MPPIController"
      angular_dist_threshold: 1.8
      forward_sampling_distance: 0.5
      rotate_to_heading_angular_vel: 1.2
      max_angular_accel: 2.0
      simulate_ahead_time: 1.0 
      debug_trajectory_details: True 
      publish_cost_grid_pc: True 
      rotate_to_heading_once: True 
      rotate_to_goal_heading: True # false
      # plugin: "dwb_core::DWBLocalPlanner"
      # max_global_plan_lookahead_dist: 1.5  # metres of arc-length
      forward_prun_distance: 3.0
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.8
      max_vel_y: 0.0
      max_vel_theta: 0.8
      min_speed_xy: 0.0
      max_speed_xy: 0.8
      min_speed_theta: 0.0
      acc_lim_x: 1.0
      acc_lim_y: 0.0
      acc_lim_theta: 2.5
      decel_lim_x: -1.0
      decel_lim_y: 0.0
      decel_lim_theta: -2.5
      vx_samples: 25
      vy_samples: 5
      vtheta_samples: 40 # 25
      sim_time: 1.0 # 1.5
      linear_granularity: 0.05
      angular_granularity: 0.025
      xy_goal_tolerance: 0.05
      path_length_tolerance: 1.0
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: True
      limit_vel_cmd_in_traj: False
      stateful: True
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist", "ObstacleFootprint"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 32.0
      GoalAlign.scale: 24.0
      Oscillation.scale: 1.0
      PathAlign.forward_point_distance: 0.1
      GoalAlign.forward_point_distance: 0.1
      PathDist.scale: 36.0 # 32.0
      GoalDist.scale: 24.0
      RotateToGoal.scale: 2.0 #32.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0


    RPP:
      plugin: "nav2_regulated_pure_pursuit_controller::RegulatedPurePursuitController"
      desired_linear_vel: 0.6
      max_linear_accel: 1.5
      max_linear_decel: 2.0
      max_angular_accel: 1.5
      lookahead_dist: 0.55
      min_lookahead_dist: 0.35
      max_lookahead_dist: 0.8
      lookahead_time: 0.5
      rotate_to_heading_angular_vel: 1.0
      transform_tolerance: 0.5

      use_velocity_scaled_lookahead_dist: false
      use_regulated_linear_velocity_scaling: false
      use_cost_regulated_linear_velocity_scaling: false

      min_speed_xy: 0.1
      max_speed_xy: 0.6
      min_speed_theta: 0.1
      max_angular_vel: 1.0

      regulate_turning_radius: true
      min_turning_radius: 0.3

      allow_reversing: false
      goal_dist_tol: 0.08

    MPPI:
      # plugin: "nav2_rotation_shim_controller::RotationShimController"
      # primary_controller: "nav2_mppi_controller::MPPIController"
      plugin: "nav2_mppi_controller::MPPIController"
      time_steps: 40 #56
      model_dt: 0.05 # 0.05
      batch_size: 2000
      vx_std: 0.2
      vy_std: 0.2
      wz_std: 0.4
      vx_max: 1.2
      vx_min: -0.35
      vy_max: 0.5
      wz_max: 1.9
      ax_max: 3.0
      ax_min: -3.0
      ay_min: -3.0
      ay_max: 3.0
      az_max: 3.5
      iteration_count: 2
      prune_distance: 3.5 #1.7
      transform_tolerance: 0.1
      temperature: 0.3
      gamma: 0.015
      motion_model: "DiffDrive"
      visualize: true
      publish_critics_stats: true 
      # reset_period: 1.0 # (only in Humble)
      regenerate_noises: false
      TrajectoryVisualizer:
        trajectory_step: 5
        time_step: 3
      TrajectoryValidator:
        plugin: "mppi::DefaultOptimalTrajectoryValidator"
        collision_lookahead_time: 2.0
        consider_footprint: true
      AckermannConstraints:
        min_turning_r: 0.0001  # 0.2 
      critics: ["ObstaclesCritic" ,"ConstraintCritic", "CostCritic", "GoalCritic", "GoalAngleCritic", "PathAlignCritic", "PathFollowCritic", "PathAngleCritic", "PreferForwardCritic"]
      ConstraintCritic:
        enabled: false
        cost_power: 1
        cost_weight: 10.0
      GoalCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0 #15.0
        threshold_to_consider: 1.0 #1.0
      GoalAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 12.0 #10.0
        threshold_to_consider: 0.5 #0.8
      PreferForwardCritic:
        enabled: true
        cost_power: 1
        cost_weight: 8.0 #5.0
        threshold_to_consider: 1.0
      ObstaclesCritic:
        enabled: true
        cost_power: 1
        repulsion_weight: 3.0 # 7.5
        critical_weight: 5.0 #15.0
        consider_footprint: false
        collision_cost: 10.0
        collision_margin_distance: 0.1
        near_goal_distance: 0.5
      #   inflation_radius: 0.55 # (only in Humble)
      #   cost_scaling_factor: 10.0 # (only in Humble)
      CostCritic:
        enabled: true
        cost_power: 1
        cost_weight:  5.0 #10.0
        critical_cost: 200.0
        consider_footprint: true
        collision_cost: 10000.0
        near_goal_distance: 1.0
        trajectory_point_step: 2
      PathAlignCritic:
        enabled: true
        cost_power: 1 #2
        cost_weight: 15.0 # 15.0
        max_path_occupancy_ratio: 0.05
        trajectory_point_step: 4
        threshold_to_consider: 1.0 #0.5
        offset_from_furthest: 20
        use_path_orientations: false #false 
      PathFollowCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0 #15.0
        offset_from_furthest: 5
        threshold_to_consider: 1.2
      PathAngleCritic:
        enabled: true
        cost_power: 1
        cost_weight: 10.0
        offset_from_furthest:  20 #4
        threshold_to_consider: 1.0
        max_angle_to_furthest: 0.78 #1.0
        mode: 0 #0
      VelocityDeadbandCritic:
        enabled: True
        cost_power: 1
        cost_weight: 35.0
        deadband_velocities: [0.05, 0.05, 0.05]
      # TwirlingCritic:
      #   enabled: true
      #   twirling_cost_power: 1
      #   twirling_cost_weight: 10.0 

    GF:
      plugin: nav2_graceful_controller::GracefulController
      min_lookahead: 0.25
      max_lookahead: 1.0
      initial_rotation: true
      initial_rotation_threshold: 0.75
      prefer_final_rotation: true
      allow_backward: false
      k_phi: 2.0
      k_delta: 1.0
      beta: 0.4
      lambda: 2.0
      v_linear_min: 0.1
      v_linear_max: 0.5
      v_angular_max: 5.0
      v_angular_min_in_place: 0.25
      slowdown_radius: 1.5    
